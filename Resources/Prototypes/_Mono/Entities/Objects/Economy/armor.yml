# T1

- type: entity
  name: basic armor plate
  description: A simple, refined "armor" alloy plate useful for things that need structural stability.
  parent: ArmorPlateEconomy1Broken
  id: ArmorPlateEconomy1
  components:
  - type: Tag
    tags:
    - EconomyGood
  - type: Sprite
    sprite: _Mono/Objects/Materials/bayponents.rsi
    state: "armor1"
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          ArmorPlateEconomy1Broken:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: StaticPrice
    price: 1000

- type: entity
  name: broken basic armor plate
  description: Wreckage from a simple armor plate. Not very surprising.
  parent: BaseEconomyGoodTier1
  id: ArmorPlateEconomy1Broken
  components:
  - type: Sprite
    sprite: _Mono/Objects/Materials/bayponents.rsi
    state: "armor1_broken"
  - type: StaticPrice
    price: 500
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Item
    size: Huge
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.15,0.15,0.15"
        density: 40
        mask:
        - MobMask
        layer:
        - MobLayer
        restitution: 0.3  # fite me
        friction: 0.2
  - type: PhysicalComposition
    materialComposition:
      Steel: 1000
      Plasteel: 500
  - type: MultiHandedItem
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.8
  - type: HeldSpeedModifier

