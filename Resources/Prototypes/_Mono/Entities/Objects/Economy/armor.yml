# T3

- type: entity
  name: composite armor plate
  description: A relatively difficult-to-produce ceramic/carbide armor plate. Lightweight for the amount of protection it grants, but it is still exceptionally heavy, making it primarily useful in ship hulls. Can be cut into two fragments.
  parent: ArmorPlateEconomy3Broken
  id: ArmorPlateEconomy3
  components:
  - type: Tag
    tags:
    - EconomyGood
  - type: Sprite
    sprite: _Mono/Objects/Materials/bayponents.rsi
    state: "armor3"
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1500
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          ArmorPlateEconomy3Broken:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: StaticPrice
    price: 6000
  - type: Butcherable
    butcheringType: Knife
    spawned:
      - id: ArmorPlateEconomy3Fragment
        amount: 2

