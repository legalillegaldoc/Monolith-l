- type: entity
  name: base economy item
  description: Used to keeo the ol' rust belt rolling.
  parent: BaseItem
  id: BaseEconomyGood
  components:
  - type: Tag
    tags:
    - EconomyGood
  - type: Item
    size: Normal
  - type: Sprite
    sprite: _Mono/Objects/Materials/bayponents.rsi
    state: "armor1"
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
# Cherry picked base item things
  - type: EmitSoundOnPickup
    sound:
      collection: GenericPickup
      params:
        volume: -7
  - type: EmitSoundOnDrop
    sound:
      collection: GenericDrop
      params:
        volume: -7
  - type: Animateable
  - type: Clickable
  - type: InteractionOutline
  - type: MovedByPressure
  - type: EmitSoundOnCollide
    sound:
      collection: WeakHit
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Effects/drop.ogg
      params:
        volume: 2
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: Pullable
  - type: DamageExaminable

- type: entity
  name: base economy item
  description: Used to keeo the ol' rust belt rolling.
  parent: BaseEconomyGood
  id: BaseEconomyGoodTier1
  abstract: true
  suffix: T1
  components:
  - type: StaticPrice
    price: 1000

